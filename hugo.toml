baseURL = "https://phaedrusqualitybookkeeping.com/"
languageCode = "en-us"
title = "Phaedrus Quality Bookkeeping"
theme = "PaperMod"
paginate = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true

[params]
  env = "production"
  title = "Phaedrus Quality Bookkeeping"
  description = "The bookkeeping industry invested billions in speed. We invested in Quality."
  author = "BrightZen, Inc."
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Quality, not speed."
    Content = """
The bookkeeping industry invested billions in making the wrong work faster.

We built something different — an AI that pursues Quality in the books the way a craftsman pursues it in a motorcycle.

Named for the philosopher who lost his mind chasing Quality. Built by the people who measure it for a living."""

  [[params.socialIcons]]
    name = "email"
    url = "mailto:phaedrus@brightzen.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "portfolio"
  name = "Portfolio"
  url = "https://www.brightzen.com/#portfolio"
  weight = 5

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 20

[[menu.main]]
  identifier = "privacy"
  name = "Privacy"
  url = "/privacy/"
  weight = 30

[[menu.main]]
  identifier = "terms"
  name = "Terms"
  url = "/terms/"
  weight = 40
